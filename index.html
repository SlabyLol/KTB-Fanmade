<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kick the Buddy - BRUTAL Fan Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Arial Black',sans-serif;user-select:none;-webkit-user-select:none;}
canvas{display:block;touch-action:none;}
#startScreen{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at center,#1a0000 0%,#000 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;
}
#startScreen h1{
  font-size:clamp(2rem,9vw,5.5rem);
  color:#ff0000;
  text-shadow:0 0 30px #ff0000,0 0 60px #ff0000,0 0 100px #880000,0 5px 0 #660000;
  letter-spacing:4px;animation:pulse 1.4s ease-in-out infinite;margin-bottom:.3em;
}
#startScreen .sub{color:#ff6600;font-size:clamp(.9rem,3vw,1.4rem);margin-bottom:.5em;letter-spacing:3px;}
#startScreen .warn{color:#555;font-size:.85rem;margin-bottom:3em;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.modeBtn{
  background:linear-gradient(135deg,#990000,#cc2200);
  color:#fff;border:3px solid #ff4400;padding:18px 50px;
  font-size:1.4rem;font-weight:900;cursor:pointer;margin:10px;
  border-radius:10px;letter-spacing:2px;transition:all .2s;text-transform:uppercase;

}
.modeBtn:hover{transform:scale(1.06);box-shadow:0 0 50px rgba(255,50,0,.9);}
.modeCaption{color:#666;font-size:.8rem;margin-top:.3em;text-align:center;}
#hud{
  position:fixed;top:0;left:0;right:0;padding:10px 16px;

  z-index:10;pointer-events:none;
}
#coins{color:#ffcc00;font-size:1.3rem;font-weight:900;text-shadow:0 0 10px #ffcc00;pointer-events:all;}
#rageWrap{flex:1;max-width:280px;}
#rageLbl{color:#ff4444;font-size:.75rem;font-weight:900;letter-spacing:2px;}
#rageBg{background:#330000;border:2px solid #550000;border-radius:10px;height:18px;overflow:hidden;}
#rageFill{height:100%;width:0%;background:linear-gradient(to right,#ff6600,#ff0000);border-radius:10px;transition:width .1s;box-shadow:0 0 8px #ff0000;}
#weaponLbl{color:#fff;font-size:.95rem;font-weight:700;pointer-events:all;cursor:pointer;}
#comboLbl{color:#ff6600;font-size:1.2rem;font-weight:900;text-shadow:0 0 12px #ff6600;min-width:90px;text-align:right;}

#shopBtn:hover{box-shadow:0 0 35px rgba(255,204,0,.8);transform:scale(1.05);}
#shopOverlay{

}
#shopPanel{

.wGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px;}
.wItem{

}
.wItem:hover{border-color:#ff3300;background:#1e0a0a;transform:scale(1.04);}
.wItem.owned{border-color:#00cc44;background:#001a0a;}

.wEmoji{font-size:1.9rem;display:block;margin-bottom:4px;}
.wName{color:#ddd;font-size:.7rem;font-weight:700;display:block;margin-bottom:3px;}
.wCost{color:#ffcc00;font-size:.78rem;font-weight:900;}
.wOwned{color:#00cc44;font-size:.72rem;font-weight:700;}
.wSel{color:#ffcc00;font-size:.72rem;font-weight:700;}
.wDesc{color:#555;font-size:.6rem;}
.closeShop{
  display:block;width:100%;margin-top:14px;
  background:#aa0000;color:#fff;border:none;padding:12px;
  font-size:1rem;font-weight:900;border-radius:8px;cursor:pointer;
}
.closeShop:hover{background:#ff0000;}
#hitBtn{
  display:none;position:fixed;bottom:20px;left:20px;
  width:78px;height:78px;
  background:radial-gradient(circle,#cc2200,#770000);
  border:3px solid #ff4400;border-radius:50%;
  color:#fff;font-size:1.9rem;cursor:pointer;z-index:10;
  box-shadow:0 0 22px rgba(255,50,0,.7);
  align-items:center;justify-content:center;font-weight:900;
  -webkit-tap-highlight-color:transparent;
}
#bubble{
  display:none;position:fixed;background:#fff;color:#222;
  padding:9px 14px;border-radius:18px;font-size:.88rem;font-weight:700;
  max-width:190px;text-align:center;z-index:20;pointer-events:none;
  box-shadow:0 4px 14px rgba(0,0,0,.6);
}
#bubble::after{
  content:'';position:absolute;bottom:-9px;left:50%;
  transform:translateX(-50%);border:9px solid transparent;
  border-top-color:#fff;border-bottom:0;
}
#deathOverlay{
  display:none;position:fixed;inset:0;
  background:rgba(120,0,0,.65);z-index:30;
  align-items:center;justify-content:center;flex-direction:column;
}
#deathOverlay h2{
  color:#ff0000;font-size:clamp(3rem,10vw,6.5rem);
  text-shadow:0 0 50px #ff0000,0 0 100px #ff0000;
  animation:dPulse .45s ease-in-out infinite;
}
#deathOverlay p{color:#ff8800;font-size:1.4rem;margin-top:8px;}
@keyframes dPulse{0%,100%{transform:scale(1) rotate(-2deg);}50%{transform:scale(1.12) rotate(2deg);}}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen">
  <h1>💀 KICK THE BUDDY 💀</h1>

  <div>
    <button class="modeBtn" onclick="startGame('pc')">🖥️ PC MODE</button>
    <p class="modeCaption">Click to hit · Click & drag to THROW</p>
  </div>
  <div style="margin-top:12px">
    <button class="modeBtn" onclick="startGame('mobile')">📱 MOBILE MODE</button>
    <p class="modeCaption">Tap to hit · Drag to THROW · Big button below</p>
  </div>
</div>

<!-- HUD -->
<div id="hud" style="display:none">

  <div id="rageWrap">
    <div id="rageLbl">RAGE: 0%</div>
    <div id="rageBg"><div id="rageFill"></div></div>
  </div>
  <div id="comboLbl"></div>
  <div id="weaponLbl"></div>
</div>

<canvas id="c"></canvas>

<button id="shopBtn" style="display:none" onclick="openShop()">🛒 SHOP</button>
<div id="hitBtn" onclick="mobileHit()">💥</div>
<div id="bubble"></div>
<div id="deathOverlay">
  <h2>💀 HE'S DEAD! 💀</h2>
  <p>Respawning in 4 seconds...</p>
</div>
<div id="shopOverlay">
  <div id="shopPanel">
    <h2>⚔️ WEAPON SHOP ⚔️</h2>
    <div class="shopCoins" id="shopCoins"></div>
    <div class="wGrid" id="wGrid"></div>
    <button class="closeShop" onclick="closeShop()">❌ CLOSE SHOP</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  WEAPONS
// ═══════════════════════════════════════
const WEAPONS=[
  {id:'fist',    name:'Fist',          emoji:'👊', cost:0,    dmg:8,   type:'hit',    rapid:false},
  {id:'boot',    name:'Steel Boot',    emoji:'👢', cost:100,  dmg:15,  type:'hit',    rapid:false},
  {id:'bat',     name:'Baseball Bat',  emoji:'🏏', cost:180,  dmg:24,  type:'hit',    rapid:false},
  {id:'crowbar', name:'Crowbar',       emoji:'🔧', cost:220,  dmg:30,  type:'hit',    rapid:false},
  {id:'sword',   name:'Katana',        emoji:'⚔️', cost:300,  dmg:38,  type:'slash',  rapid:false},
  {id:'axe',     name:'Battle Axe',    emoji:'🪓', cost:350,  dmg:45,  type:'slash',  rapid:false},
  {id:'knife',   name:'Knife',         emoji:'🔪', cost:250,  dmg:28,  type:'slash',  rapid:true},
  {id:'chainsaw',name:'Chainsaw',      emoji:'⚙️', cost:800,  dmg:55,  type:'slash',  rapid:true},
  {id:'scythe',  name:'Scythe',        emoji:'☠️', cost:900,  dmg:65,  type:'slash',  rapid:false},
  {id:'gun',     name:'Pistol',        emoji:'🔫', cost:400,  dmg:45,  type:'bullet', rapid:false},
  {id:'shotgun', name:'Shotgun',       emoji:'🦆', cost:500,  dmg:80,  type:'shotgun',rapid:false},
  {id:'ak47',    name:'AK-47',         emoji:'🔰', cost:650,  dmg:32,  type:'bullet', rapid:true},
  {id:'sniper',  name:'Sniper',        emoji:'🎯', cost:700,  dmg:130, type:'bullet', rapid:false},
  {id:'acid',    name:'Acid Bucket',   emoji:'🧪', cost:600,  dmg:60,  type:'acid',   rapid:false},
  {id:'zombie',  name:'Zombie Hand',   emoji:'🧟', cost:450,  dmg:35,  type:'zombie', rapid:false},
  {id:'spider',  name:'Spider Venom',  emoji:'🕷️', cost:550,  dmg:50,  type:'acid',   rapid:false},
  {id:'hammer',  name:'Thor Hammer',   emoji:'🔨', cost:850,  dmg:95,  type:'hammer', rapid:false},
  {id:'tnt',     name:'TNT',           emoji:'🧱', cost:700,  dmg:90,  type:'explode',rapid:false},
  {id:'grenade', name:'Grenade',       emoji:'💣', cost:750,  dmg:100, type:'explode',rapid:false},
  {id:'flame',   name:'Flamethrower',  emoji:'🔥', cost:1000, dmg:75,  type:'fire',   rapid:true},
  {id:'freeze',  name:'Freeze Ray',    emoji:'🧊', cost:900,  dmg:45,  type:'freeze', rapid:false},
  {id:'laser',   name:'Death Laser',   emoji:'💡', cost:1200, dmg:150, type:'laser',  rapid:false},
  {id:'rocket',  name:'Rocket',        emoji:'🚀', cost:1400, dmg:200, type:'explode',rapid:false},
  {id:'blackhole',name:'Black Hole',   emoji:'🌑', cost:2000, dmg:180, type:'black',  rapid:false},
  {id:'nuke',    name:'☢️ ATOM BOMB',  emoji:'☢️', cost:5000, dmg:500, type:'nuke',   rapid:false},
  {id:'minigun', name:'Minigun OP',    emoji:'🔫🔫', cost:5000, dmg:120, type: 'bullet', rapid:true},
];

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let gameMode='pc';
let coins=500,rage=0,combo=0,comboTimer=0;
let selWeapon=WEAPONS[0],owned=new Set(['fist']);
let isDead=false,deadTimer=0;
let isDrag=false,dragOX=0,dragOY=0;
let mX=0,mY=0;
let audioCtx=null;
let isSpeaking=false,lastTaunt=0;
let bloodSplats=[];
let particles=[];
let shake={x:0,y:0,i:0};
let room={L:0,R:0,T:0,B:0};
let baseX=0,baseY=0;
let dragHist=[];
let rapidTimer=0;
let freezeTimer=0;

// ═══════════════════════════════════════
//  BUDDY
// ═══════════════════════════════════════
const B={
  x:0,y:0,vx:0,vy:0,
  rot:0,aVel:0,scale:1,scaleTarget:1,
  LA:-0.3,RA:0.3,LL:0.1,RL:-0.1,  // limb angles
  expr:'normal',exprT:0,
  hitFlash:0,bruised:false,torn:false,
  bleedT:0,isFrozen:false,
};

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  room.L=70; room.R=canvas.width-70;
  room.T=75; room.B=canvas.height-55;
  baseX=canvas.width/2; baseY=room.T+(room.B-room.T)*0.42;
  if(!isDrag&&Math.abs(B.vx)<1&&Math.abs(B.vy)<1){B.x=baseX;B.y=baseY;}
}

// ═══════════════════════════════════════
//  AUDIO (Web Audio API)
// ═══════════════════════════════════════
function getAC(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function noise(ac,dur,filt,filtFreq,vol){
  const buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const src=ac.createBufferSource();
  const f=ac.createBiquadFilter(); f.type=filt; f.frequency.value=filtFreq;
  const g=ac.createGain(); const now=ac.currentTime;
  src.buffer=buf; src.connect(f); f.connect(g); g.connect(ac.destination);
  g.gain.setValueAtTime(vol,now); g.gain.exponentialRampToValueAtTime(0.001,now+dur);
  src.start(now); src.stop(now+dur);
}
function osc(ac,type,freqA,freqB,dur,vol){
  const o=ac.createOscillator(); const g=ac.createGain(); const now=ac.currentTime;
  o.type=type; o.frequency.setValueAtTime(freqA,now);
  if(freqB) o.frequency.exponentialRampToValueAtTime(freqB,now+dur);
  o.connect(g); g.connect(ac.destination);
  g.gain.setValueAtTime(vol,now); g.gain.exponentialRampToValueAtTime(0.001,now+dur);
  o.start(now); o.stop(now+dur);
}
function playSound(type){
  try{
    const ac=getAC();
    if(type==='punch'){ osc(ac,'sawtooth',200,25,.18,.7); }
    else if(type==='slash'){ noise(ac,.12,'highpass',2500,.5); }
    else if(type==='gun'){ noise(ac,.09,'bandpass',2000,1); }
    else if(type==='shotgun'){ noise(ac,.15,'lowpass',1200,1.2); osc(ac,'sawtooth',80,20,.2,.4); }
    else if(type==='chainsaw'){ osc(ac,'sawtooth',82,78,.4,.3); osc(ac,'sawtooth',85,79,.4,.25); }
    else if(type==='explode'){ noise(ac,.7,'lowpass',600,1.5); osc(ac,'sine',60,10,.5,.8); }
    else if(type==='acid'){ osc(ac,'sine',900,150,.3,.25); }
    else if(type==='fire'){ noise(ac,.3,'bandpass',500,.4); }
    else if(type==='laser'){ osc(ac,'sine',3500,100,.2,.35); }
    else if(type==='freeze'){ osc(ac,'triangle',2000,4000,.2,.3); noise(ac,.15,'highpass',4000,.2); }
    else if(type==='zombie'){ osc(ac,'square',130,60,.35,.25); }
    else if(type==='blackhole'){ osc(ac,'sine',60,8,.6,.5); }
    else if(type==='hammer'){ noise(ac,.1,'lowpass',800,1); osc(ac,'sawtooth',120,20,.15,.6); }
    else if(type==='nuke'){
      noise(ac,1.5,'lowpass',400,2); osc(ac,'sine',40,5,1.5,1);
      setTimeout(()=>{ noise(ac,.8,'lowpass',1000,1.5); },300);
    }
  }catch(e){}
}

// ═══════════════════════════════════════
//  SPEECH
// ═══════════════════════════════════════
const LINES={
  hit:["OUCH!","AHH!","STOP IT!","THAT HURTS!","PLEASE NO!","OW OW OW!","MY FACE!","HELP ME!","NOT AGAIN!","WHY?!"],
  slash:["MY ARM!","I'M BLEEDING!","STOOOOP!","MURDERER!","CUT ME NOT!","AHHHHH!"],
  explode:["KABOOM!","I'M ON FIRE!","TOO MUCH!","MY ORGANS!","BLOWN APART!","WHAT WAS THAT?!"],
  acid:["IT BURNS!","DISSOLVING!","ACID HURTS!","MELTING!","SIZZLING PAIN!"],
  zombie:["BRAAAAINS!","WHAT IS THAT?!","ZOMBIE ATTACK!","GET IT OFF ME!"],
  freeze:["SO COLD!","I CAN'T MOVE!","FROZEN!","BRRRR!"],
  black:["INTO THE VOID!","SINGULARITY!","HELP!","NOOOOO!"],
  taunt:["Is that all?","Come on hit me!","I've felt worse...","HARDER!","Pathetic!","My grandma hits harder!","You call that a punch?","More! MORE!"],
  rage50:["Oh no...","Not good!","Stop before it's too late!","I can feel the rage..."],
  rage90:["CRITICAL RAGE!","I'M GONNA BLOW!","EVACUATE NOW!","DANGER DANGER!"],
  death:["GOODBYE CRUEL WORLD!","I'M DEAD!","TELL MY FAMILY!","NOOOOOOO!","SO THIS IS THE END!"],
};
function rndLine(cat){ const a=LINES[cat]||LINES.hit; return a[Math.floor(Math.random()*a.length)]; }
function speak(txt){
  if(!window.speechSynthesis||isSpeaking) return;
  try{
    const u=new SpeechSynthesisUtterance(txt);
    u.rate=1.2+Math.random()*.6; u.pitch=0.7+Math.random()*.9; u.volume=1;
    u.onend=u.onerror=()=>{ isSpeaking=false; };
    isSpeaking=true;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
    showBubble(txt);
  }catch(e){ isSpeaking=false; }
}
function showBubble(txt){
  const el=document.getElementById('bubble');
  el.textContent=txt;
  el.style.left=Math.max(10,Math.min(canvas.width-200,B.x-90))+'px';
  el.style.top=Math.max(10,B.y-130)+'px';
  el.style.display='block';
  clearTimeout(el._t); el._t=setTimeout(()=>el.style.display='none',2200);
}

// ═══════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════
function mkBlood(x,y,n,spd,xVel=0,yVel=0){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const s=spd*(0.3+Math.random()*.7);
    particles.push({t:'blood',x,y,
      vx:Math.cos(a)*s+xVel*.3,vy:Math.sin(a)*s+yVel*.3-Math.random()*2,
      sz:2+Math.random()*9,life:1,dec:0.013+Math.random()*.018,
      col:Math.random()<.65?'#bb0000':Math.random()<.5?'#880000':'#ff2200',grav:.32});
  }
}
function mkExplosion(x,y,R){
  // fire
  for(let i=0;i<70;i++){
    const a=Math.random()*Math.PI*2, s=R*.055*(0.5+Math.random());
    particles.push({t:'fire',x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,
      sz:12+Math.random()*22,life:1,dec:.022+Math.random()*.018,
      col:Math.random()<.4?'#ffff88':Math.random()<.5?'#ff8800':'#ff3300',grav:-.06});
  }
  // shockwave
  particles.push({t:'shock',x,y,sz:10,maxSz:R*1.4,life:1,dec:.04,col:'rgba(255,200,100',grav:0,vx:0,vy:0});
  // debris
  for(let i=0;i<25;i++){
    const a=Math.random()*Math.PI*2, s=R*.09*(0.5+Math.random());
    particles.push({t:'debris',x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-6,
      sz:3+Math.random()*9,life:1,dec:.009,col:'#665544',grav:.45,
      rot:Math.random()*Math.PI*2,aVel:(Math.random()-.5)*.35});
  }
  // smoke
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2;
    particles.push({t:'smoke',x:x+(Math.random()-.5)*R*.5,y:y+(Math.random()-.5)*R*.5,
      vx:Math.cos(a)*1.5,vy:Math.sin(a)-.8,sz:22+Math.random()*30,
      life:1,dec:.006,col:'#444',grav:-.04});
  }
  mkBlood(x,y,45,R*.07);
}
function mkAcid(x,y){
  for(let i=0;i<35;i++){
    const a=Math.random()*Math.PI*2, s=3+Math.random()*7;
    particles.push({t:'acid',x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,
      sz:4+Math.random()*12,life:1,dec:.018,
      col:Math.random()<.5?'#00ff44':'#aaff00',grav:.25});
  }
}
function mkLaser(x,y){
  for(let i=0;i<25;i++){
    particles.push({t:'laser',x:x+(Math.random()-.5)*50,y:y+(Math.random()-.5)*50,
      vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*10,
      sz:2+Math.random()*7,life:1,dec:.04,col:Math.random()<.5?'#ff00ff':'#ff99ff',grav:0});
  }
}
function mkFreeze(x,y){
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2;
    particles.push({t:'ice',x,y,vx:Math.cos(a)*(2+Math.random()*5),vy:Math.sin(a)*(2+Math.random()*5),
      sz:3+Math.random()*8,life:1,dec:.02,col:Math.random()<.5?'#88ddff':'#ffffff',grav:.1});
  }
}
function mkBodyParts(x,y){
  const emojis=['💀','🦴','🫀','🧠','🫁','🦷','👁️','🩸'];
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2, s=5+Math.random()*14;
    particles.push({t:'part',x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-9,
      sz:18+Math.random()*18,life:1,dec:.005,col:'#fff',grav:.55,
      emoji:emojis[Math.floor(Math.random()*emojis.length)],
      rot:Math.random()*Math.PI*2,aVel:(Math.random()-.5)*.4});
  }
}
function splatWall(x,y,n){
  for(let i=0;i<n;i++){
    bloodSplats.push({
      x:x+(Math.random()-.5)*70,y:y+(Math.random()-.5)*70,
      r:3+Math.random()*24,alpha:.55+Math.random()*.45,
      col:Math.random()<.65?'#880000':'#cc0000',
      drip:Math.random()<.4?{len:8+Math.random()*90,w:1+Math.random()*3}:null
    });
  }
}

// ═══════════════════════════════════════
//  DRAW ROOM
// ═══════════════════════════════════════
function drawRoom(){
  // Background gradient
  const bg=ctx.createLinearGradient(0,0,0,canvas.height);
  bg.addColorStop(0,'#120000'); bg.addColorStop(1,'#0a0000');
  ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);

  // Brick wall
  const bW=62,bH=26,sX=room.L,eX=room.R,sY=room.T,eY=room.B-40;
  for(let row=0;row*bH<(eY-sY);row++){
    const yy=sY+row*bH;
    const off=(row%2===0)?0:bW/2;
    for(let col=-1;col*bW<(eX-sX+bW);col++){
      const xx=sX+col*bW+off;
      if(xx>eX||xx+bW<sX) continue;
      const d=.82+Math.random()*.18;
      ctx.fillStyle=`rgb(${~~(55*d)},${~~(8*d)},${~~(8*d)})`;
      ctx.fillRect(xx+1,yy+1,bW-2,bH-2);
      ctx.strokeStyle='#160000'; ctx.lineWidth=1;
      ctx.strokeRect(xx+1,yy+1,bW-2,bH-2);
    }
  }

  // Side vignettes
  const gL=ctx.createLinearGradient(0,0,room.L,0);
  gL.addColorStop(0,'rgba(0,0,0,.95)'); gL.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gL; ctx.fillRect(0,0,room.L,canvas.height);
  const gR=ctx.createLinearGradient(room.R,0,canvas.width,0);
  gR.addColorStop(0,'rgba(0,0,0,0)'); gR.addColorStop(1,'rgba(0,0,0,.95)');
  ctx.fillStyle=gR; ctx.fillRect(room.R,0,canvas.width-room.R,canvas.height);

  // Chain / rope
  ctx.strokeStyle='#554433'; ctx.lineWidth=3; ctx.setLineDash([8,5]);
  ctx.beginPath(); ctx.moveTo(baseX,room.T); ctx.lineTo(B.x,B.y-62); ctx.stroke();
  ctx.setLineDash([]);

  // Floor
  ctx.fillStyle='#3d1400'; ctx.fillRect(0,room.B,canvas.width,canvas.height-room.B+10);
  ctx.strokeStyle='#280e00'; ctx.lineWidth=2;
  for(let px=0;px<canvas.width;px+=75){ctx.beginPath();ctx.moveTo(px,room.B);ctx.lineTo(px,canvas.height);ctx.stroke();}
  ctx.fillStyle='#5c2200'; ctx.fillRect(0,room.B,canvas.width,7);

  // Ceiling
  ctx.fillStyle='#0a0000'; ctx.fillRect(0,0,canvas.width,room.T);
  ctx.fillStyle='#1a0000'; ctx.fillRect(0,room.T-5,canvas.width,5);

  // Torches
  drawTorch(room.L+45,room.T+55);
  drawTorch(room.R-45,room.T+55);
  if(canvas.width>600){drawTorch(canvas.width/2,room.T+25);}

  // Wall decorations
  // Skull drawings on wall
  ctx.save(); ctx.globalAlpha=0.15; ctx.font='40px serif'; ctx.textAlign='center';
  ctx.fillText('💀',room.L+35,room.B-60);
  ctx.fillText('💀',room.R-35,room.B-60);
  ctx.restore();

  // Blood splatters
  bloodSplats.forEach(s=>{
    ctx.save(); ctx.globalAlpha=s.alpha;
    ctx.fillStyle=s.col;
    ctx.beginPath(); ctx.ellipse(s.x,s.y,s.r,s.r*.65,0,0,Math.PI*2); ctx.fill();
    if(s.drip){
      ctx.fillStyle=s.col;
      ctx.fillRect(s.x-s.drip.w/2,s.y,s.drip.w,s.drip.len);
      ctx.beginPath(); ctx.arc(s.x,s.y+s.drip.len,s.drip.w,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
}

function drawTorch(x,y){
  ctx.save();
  ctx.fillStyle='#5c3300'; ctx.fillRect(x-3,y,6,28);
  const flick=Math.sin(Date.now()*.012)*4;
  const fg=ctx.createRadialGradient(x,y-8+flick,1,x,y+6,20);
  fg.addColorStop(0,'rgba(255,255,180,.95)'); fg.addColorStop(.45,'#ff8800'); fg.addColorStop(1,'rgba(255,0,0,0)');
  ctx.fillStyle=fg; ctx.beginPath(); ctx.ellipse(x,y-4+flick,13,22,0,0,Math.PI*2); ctx.fill();
  const gg=ctx.createRadialGradient(x,y,0,x,y,90);
  gg.addColorStop(0,'rgba(255,140,0,.12)'); gg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(x,y,90,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════
//  BUDDY DRAWING
// ═══════════════════════════════════════
function drawBuddy(){
  ctx.save();
  ctx.translate(B.x,B.y);
  ctx.rotate(B.rot);
  const s=B.scale+(B.scaleTarget-B.scale)*0.1; B.scale=s;
  ctx.scale(s,s);
  const f=B.hitFlash;

  function skinColor(base,dark){
    if(f>0) return `rgba(255,${~~(base*(1-f)*.5)},${~~(dark*(1-f)*.3)},1)`;
    return B.bruised?'#bb7744':base;
  }

  // Shadow under feet
  ctx.save(); ctx.translate(0,72); ctx.scale(1,.18);
  const sg=ctx.createRadialGradient(0,0,0,0,0,42);
  sg.addColorStop(0,'rgba(0,0,0,.45)'); sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(0,0,42,0,Math.PI*2); ctx.fill(); ctx.restore();

  // LEFT ARM
  ctx.save(); ctx.translate(-32,-8); ctx.rotate(B.LA);
  ctx.fillStyle=skinColor('#eebc80','#c08040');
  rr(ctx,-8,0,16,46,8); ctx.fill();
  ctx.beginPath(); ctx.arc(0,50,11,0,Math.PI*2); ctx.fill();
  if(B.bruised){ctx.fillStyle='rgba(100,0,0,.4)';ctx.beginPath();ctx.arc(0,25,8,0,Math.PI*2);ctx.fill();}
  ctx.restore();

  // RIGHT ARM
  ctx.save(); ctx.translate(32,-8); ctx.rotate(B.RA);
  ctx.fillStyle=skinColor('#eebc80','#c08040');
  rr(ctx,-8,0,16,46,8); ctx.fill();
  ctx.beginPath(); ctx.arc(0,50,11,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // BODY
  const bg2=ctx.createLinearGradient(-36,-52,36,52);
  bg2.addColorStop(0,B.bruised?'#bb7744':'#eebc80');
  bg2.addColorStop(1,B.bruised?'#885522':'#c08040');
  ctx.fillStyle=f>0?`rgba(255,${~~(100*(1-f))},${~~(80*(1-f))},1)`:bg2;
  rr(ctx,-36,-52,72,104,22); ctx.fill();

  // Shirt (torn if needed)
  ctx.fillStyle=B.torn?'rgba(40,20,0,.6)':'rgba(30,50,120,.55)';
  rr(ctx,-34,-20,68,70,16); ctx.fill();
  if(B.torn){
    ctx.fillStyle='rgba(0,0,0,.5)';
    ctx.beginPath();
    ctx.moveTo(-20,-20);ctx.lineTo(-5,10);ctx.lineTo(8,-5);ctx.lineTo(22,15);ctx.lineTo(30,-5);
    ctx.closePath(); ctx.fill();
  }

  // Wounds
  if(B.bruised){
    ctx.fillStyle='#770000';
    ctx.beginPath();ctx.ellipse(-16,-18,9,4,.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(12,12,6,3,-.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#cc0000';
    ctx.fillRect(-17,-14,3,22);ctx.fillRect(11,15,3,18);
  }

  // HEAD
  const hg=ctx.createRadialGradient(-10,-82,5,0,-78,42);
  hg.addColorStop(0,B.bruised?'#cc8855':'#f5c880');
  hg.addColorStop(1,B.bruised?'#885533':'#d09050');
  ctx.fillStyle=f>0?`rgba(255,${~~(140*(1-f))},${~~(100*(1-f))},1)`:hg;
  ctx.beginPath(); ctx.ellipse(0,-82,40,44,0,0,Math.PI*2); ctx.fill();

  // Hair
  ctx.fillStyle='#2a0a00';
  ctx.beginPath();ctx.ellipse(0,-118,32,13,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(-30,-104,13,19,-.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(30,-104,13,19,.3,0,Math.PI*2);ctx.fill();

  // Ears
  ctx.fillStyle=B.bruised?'#bb7744':'#e0a870';
  ctx.beginPath();ctx.ellipse(-39,-82,8,10,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(39,-82,8,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffcc00';
  ctx.beginPath();ctx.arc(-39,-82,3.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(39,-82,3.5,0,Math.PI*2);ctx.fill();

  // Nose
  ctx.fillStyle=B.bruised?'#aa6633':'#d09050';
  ctx.beginPath();ctx.ellipse(0,-74,8,5.5,0,0,Math.PI*2);ctx.fill();

  drawEyes();
  drawMouth();

  // LEGS
  ctx.save(); ctx.translate(-20,52); ctx.rotate(B.LL);
  ctx.fillStyle='#224488'; rr(ctx,-10,0,20,52,9); ctx.fill();
  ctx.fillStyle='#181000'; ctx.beginPath();ctx.ellipse(0,56,13,8,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.save(); ctx.translate(20,52); ctx.rotate(B.RL);
  ctx.fillStyle='#224488'; rr(ctx,-10,0,20,52,9); ctx.fill();
  ctx.fillStyle='#181000'; ctx.beginPath();ctx.ellipse(0,56,13,8,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Ice overlay if frozen
  if(B.isFrozen){
    ctx.fillStyle='rgba(100,200,255,.35)';
    rr(ctx,-40,-130,80,190,22); ctx.fill();
    ctx.strokeStyle='rgba(150,220,255,.6)'; ctx.lineWidth=2;
    rr(ctx,-40,-130,80,190,22); ctx.stroke();
  }

  ctx.restore();
}

function drawEyes(){
  const ex=B.expr;
  ctx.fillStyle='white';
  ctx.beginPath();ctx.ellipse(-17,-88,14,14,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(17,-88,14,14,0,0,Math.PI*2);ctx.fill();

  if(ex==='dead'){
    ctx.strokeStyle='#222';ctx.lineWidth=3.5;
    [[[-24,-95,-10,-81],[-10,-95,-24,-81]],[[10,-95,24,-81],[24,-95,10,-81]]].forEach(pair=>{
      pair.forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
    });
    // Swirly dead eyes
    return;
  }

  const py=ex==='pain'?-85:-88;
  const pox=ex==='scared'?4:0;
  ctx.fillStyle=ex==='rage'?'#ff0000':'#1a1a1a';
  ctx.beginPath();ctx.arc(-17+pox,py,7,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(17+pox,py,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath();ctx.arc(-19+pox,py-2,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(15+pox,py-2,2.5,0,Math.PI*2);ctx.fill();

  // Eyebrows
  ctx.strokeStyle='#2a0a00';ctx.lineWidth=3.5;ctx.lineCap='round';
  if(ex==='pain'||ex==='scared'){
    ctx.beginPath();ctx.moveTo(-28,-103);ctx.quadraticCurveTo(-17,-112,-7,-103);ctx.stroke();
    ctx.beginPath();ctx.moveTo(7,-103);ctx.quadraticCurveTo(17,-112,28,-103);ctx.stroke();
  } else if(ex==='rage'){
    ctx.beginPath();ctx.moveTo(-28,-100);ctx.lineTo(-7,-107);ctx.stroke();
    ctx.beginPath();ctx.moveTo(7,-107);ctx.lineTo(28,-100);ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(-28,-100);ctx.quadraticCurveTo(-17,-104,-7,-100);ctx.stroke();
    ctx.beginPath();ctx.moveTo(7,-100);ctx.quadraticCurveTo(17,-104,28,-100);ctx.stroke();
  }

  if(B.bruised){
    ctx.fillStyle='rgba(80,0,0,.55)';
    ctx.beginPath();ctx.ellipse(-17,-86,16,10,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(17,-86,16,10,0,0,Math.PI*2);ctx.fill();
  }
}

function drawMouth(){
  const ex=B.expr;
  ctx.strokeStyle='#441100';ctx.lineWidth=3;ctx.lineCap='round';
  if(ex==='pain'){
    ctx.fillStyle='#1a0000';
    ctx.beginPath();ctx.ellipse(0,-62,16,20,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#cc3333';
    ctx.beginPath();ctx.ellipse(0,-60,11,9,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='white';
    for(let i=-2;i<=2;i++) ctx.fillRect(i*7-3,-70,5,9);
  } else if(ex==='rage'){
    ctx.beginPath();ctx.moveTo(-20,-64);ctx.lineTo(20,-64);ctx.stroke();
    ctx.fillStyle='white';
    for(let i=-3;i<=3;i++) ctx.fillRect(i*6-3,-67,5,5);
  } else if(ex==='dead'){
    ctx.beginPath();ctx.moveTo(-14,-65);ctx.lineTo(14,-65);ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(-16,-63);ctx.quadraticCurveTo(0,-56,16,-63);ctx.stroke();
  }
}

// ═══════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════
function updateBuddy(dt){
  if(isDead) return;

  B.hitFlash=Math.max(0,B.hitFlash-.055);
  if(B.exprT>0){B.exprT-=dt;if(B.exprT<=0)B.expr='normal';}
  if(B.bruised&&Math.random()<.025) mkBlood(B.x+(Math.random()-.5)*40,B.y+(Math.random()-.5)*60,1,2);

  // Frozen
  if(B.isFrozen){
    B.vx*=0.8; B.vy*=0.8; B.aVel*=0.8;
    freezeTimer-=dt;
    if(freezeTimer<=0) B.isFrozen=false;
  }

  if(isDrag){
    B.x+=(mX-dragOX-B.x)*.45;
    B.y+=(mY-dragOY-B.y)*.45;
    B.aVel*=.9; B.rot*=.95; B.vx=0; B.vy=0;
    const t=Date.now()*.008;
    B.LA=-0.9+Math.sin(t)*.5; B.RA=0.9+Math.sin(t+1)*.5;
    B.LL=-0.5+Math.cos(t*.8)*.6; B.RL=0.5+Math.cos(t*.8+1.6)*.6;
    return;
  }

  const dx=B.x-baseX, dy=B.y-baseY;
  const dist=Math.sqrt(dx*dx+dy*dy);

  if(dist>3||Math.abs(B.vx)>0.4||Math.abs(B.vy)>0.4){
    if(!B.isFrozen) B.vy+=0.48;
    const k=dist>180?.007:.022;
    B.vx-=dx*k; B.vy-=dy*k;
    B.vx*=.986; B.vy*=.986;
    B.x+=B.vx; B.y+=B.vy;

    // Collisions
    const bL=room.L+44,bR=room.R-44,bT=room.T+44,bB=room.B-35;
    if(B.x<bL){
      B.x=bL; const spd=Math.abs(B.vx);
      B.vx=spd*.58; B.aVel=(Math.random()-.5)*.45;
      if(spd>2){splatWall(room.L+15,B.y,~~spd+2);mkBlood(B.x,B.y,~~(spd*3),spd*.6,B.vx,B.vy);}
    }
    if(B.x>bR){
      B.x=bR; const spd=Math.abs(B.vx);
      B.vx=-spd*.58; B.aVel=(Math.random()-.5)*.45;
      if(spd>2){splatWall(room.R-15,B.y,~~spd+2);mkBlood(B.x,B.y,~~(spd*3),spd*.6,B.vx,B.vy);}
    }
    if(B.y<bT){
      B.y=bT; const spd=Math.abs(B.vy);
      B.vy=spd*.5;
      if(spd>3){splatWall(B.x,room.T+10,~~spd);}
    }
    if(B.y>bB){
      B.y=bB; const imp=Math.abs(B.vy);
      B.vy=-imp*.52; B.vx*=.78; B.aVel*=.65;
      if(imp>3){splatWall(B.x,room.B,~~imp+1);mkBlood(B.x,B.y,~~(imp*4),imp*.55,B.vx,imp);}
    }

    B.rot+=B.aVel; B.aVel*=.94; B.rot*=.97;
    const spd2=Math.sqrt(B.vx*B.vx+B.vy*B.vy);
    if(spd2>1.5){
      const t=Date.now()*.016;
      B.LA=-Math.sin(t)*1.3; B.RA=Math.sin(t+1)*1.3;
      B.LL=Math.cos(t*.9)*.9; B.RL=-Math.cos(t*.9+.6)*.9;
    }
  } else {
    B.x=baseX; B.vx=0; B.vy=0;
    const t=Date.now()*.0016;
    B.y=baseY+Math.sin(t)*5; B.rot=Math.sin(t*.7)*.055;
    B.LA=-0.3+Math.sin(t*1.4)*.12; B.RA=0.3+Math.sin(t*1.1+1)*.12;
    B.LL=0.1+Math.cos(t)*.07; B.RL=-0.1+Math.cos(t+1.1)*.07;
  }

  // Combo decay
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0){combo=0;updateHUD();}}
  if(rage>0) rage=Math.max(0,rage-.012);

  // Idle taunt
  const now=Date.now();
  if(now-lastTaunt>9000+Math.random()*6000){
    lastTaunt=now;
    if(B.expr==='normal') speak(rndLine('taunt'));
  }

  updateHUD();
}

// ═══════════════════════════════════════
//  PARTICLES UPDATE + DRAW
// ═══════════════════════════════════════
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    if(p.grav) p.vy+=p.grav;
    p.vx*=.97; p.life-=p.dec;
    if(p.rot!==undefined) p.rot+=p.aVel;

    if(p.t==='blood'){
      if(p.y>room.B-4){
        p.vy=0;p.vx*=.4;p.grav=0;
        if(Math.random()<.35){splatWall(p.x,room.B,1);p.life=0;}
      }
      if(p.x<room.L+8){p.vx=0;p.grav=0;splatWall(room.L+4,p.y,1);p.life=0;}
      if(p.x>room.R-8){p.vx=0;p.grav=0;splatWall(room.R-4,p.y,1);p.life=0;}
    }
    if(p.life<=0) particles.splice(i,1);
  }
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life);
    if(p.t==='blood'){
      ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();
    } else if(p.t==='fire'){
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.sz);
      g.addColorStop(0,'rgba(255,255,180,.9)');g.addColorStop(.5,p.col);g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();
    } else if(p.t==='shock'){
      const prog=1-p.life;
      const curR=p.maxSz*prog;
      ctx.strokeStyle=p.col+`,${p.life*.7})`;ctx.lineWidth=4*(1-prog);
      ctx.beginPath();ctx.arc(p.x,p.y,curR,0,Math.PI*2);ctx.stroke();
    } else if(p.t==='smoke'){
      ctx.fillStyle=`rgba(60,60,60,${p.life*.25})`;
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();
    } else if(p.t==='debris'){
      ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);
      ctx.fillStyle=p.col;ctx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz);
    } else if(p.t==='acid'||p.t==='ice'){
      ctx.shadowBlur=12;ctx.shadowColor=p.col;
      ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();
    } else if(p.t==='laser'){
      ctx.shadowBlur=16;ctx.shadowColor=p.col;
      ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();
    } else if(p.t==='part'){
      ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);
      ctx.font=p.sz+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(p.emoji,0,0);
    }
    ctx.restore();
  });
}

// ═══════════════════════════════════════
//  HIT LOGIC
// ═══════════════════════════════════════
function inBuddy(px,py){
  const dx=px-B.x,dy=py-B.y;
  return Math.sqrt(dx*dx+dy*dy)<85;
}

function hitBuddy(px,py,weapon){
  if(isDead) return;
  const dx=B.x-px,dy=B.y-py;
  const d=Math.sqrt(dx*dx+dy*dy)||1;
  const dmg=weapon.dmg*(1+combo*.08);
  rage=Math.min(100,rage+dmg*.28);
  coins+=Math.floor(dmg*.5*(1+combo*.04));
  combo++; comboTimer=3.5;

  const force=7+dmg*.18;
  if(!B.isFrozen){
    B.vx=(dx/d)*force*.85+(Math.random()-.5)*3;
    B.vy=(dy/d)*force*.85-3.5;
    B.aVel=(Math.random()-.5)*.45;
  }
  B.hitFlash=1; B.expr='pain'; B.exprT=1.5;
  B.bruised=rage>38; B.torn=rage>58;
  shake.i=Math.max(shake.i,Math.min(22,dmg*.1));

  // Weapon effects
  switch(weapon.type){
    case 'hit':
      mkBlood(B.x,B.y,10,6);playSound('punch');speak(rndLine('hit'));break;
    case 'slash':
      mkBlood(B.x,B.y,22,10);playSound('slash');speak(rndLine('slash'));break;
    case 'shotgun':
      mkBlood(B.x,B.y,30,12);playSound('shotgun');speak(rndLine('slash'));break;
    case 'bullet':
      mkBlood(B.x,B.y,18,14);
      playSound(weapon.id==='ak47'?'gun':weapon.id==='shotgun'?'shotgun':'gun');
      speak(rndLine('hit'));break;
    case 'explode':
      const R=weapon.id==='nuke'?320:weapon.id==='rocket'?210:130;
      mkExplosion(B.x,B.y,R);playSound(weapon.id==='nuke'?'nuke':'explode');
      shake.i=Math.max(shake.i,weapon.id==='nuke'?45:28);
      speak(rndLine('explode'));
      if(weapon.id==='nuke'){for(let i=0;i<12;i++) splatWall(Math.random()*canvas.width,Math.random()*canvas.height,10);}
      break;
    case 'acid':
      mkAcid(B.x,B.y);playSound('acid');speak(rndLine('acid'));break;
    case 'zombie':
      mkBlood(B.x,B.y,15,7);playSound('zombie');speak(rndLine('zombie'));break;
    case 'fire':
      for(let i=0;i<3;i++) mkExplosion(B.x+(Math.random()-.5)*50,B.y+(Math.random()-.5)*50,65);
      playSound('fire');speak(rndLine('explode'));break;
    case 'freeze':
      mkFreeze(B.x,B.y);playSound('freeze');speak(rndLine('freeze'));
      B.isFrozen=true;freezeTimer=3;B.expr='pain';B.exprT=3;break;
    case 'laser':
      mkLaser(B.x,B.y);playSound('laser');speak(rndLine('hit'));break;
    case 'hammer':
      mkExplosion(B.x,B.y,90);playSound('hammer');speak(rndLine('explode'));
      B.vy=-18;break;
    case 'black':
      playSound('blackhole');B.scaleTarget=0.15;
      setTimeout(()=>{B.scaleTarget=1.8;
        setTimeout(()=>{
          B.scaleTarget=1;mkExplosion(B.x,B.y,220);mkBlood(B.x,B.y,60,12);
        },400);
      },600);
      speak(rndLine('black'));break;
    case 'nuke':
      mkExplosion(B.x,B.y,350);playSound('nuke');
      for(let i=0;i<18;i++) splatWall(Math.random()*canvas.width,Math.random()*canvas.height,12);
      speak(rndLine('explode'));break;
  }
  if(weapon.id==='chainsaw') playSound('chainsaw');

  // Rage milestones
  if(rage>=50&&rage<54) speak(rndLine('rage50'));
  if(rage>=90&&rage<94){speak(rndLine('rage90'));B.expr='rage';B.exprT=4;}

  if(rage>=100&&!isDead) killBuddy();
  updateHUD();
}

// ═══════════════════════════════════════
//  DEATH SEQUENCE
// ═══════════════════════════════════════
function killBuddy(){
  isDead=true; B.expr='dead';
  speak(rndLine('death'));
  playSound('nuke'); shake.i=50;

  mkExplosion(B.x,B.y,320);
  mkBodyParts(B.x,B.y);
  for(let i=0;i<120;i++) mkBlood(B.x+(Math.random()-.5)*250,B.y+(Math.random()-.5)*250,5,18);
  for(let i=0;i<20;i++) splatWall(Math.random()*canvas.width,Math.random()*canvas.height,14);

  // Chain explosions
  for(let i=0;i<8;i++){
    setTimeout(()=>{
      mkExplosion(B.x+(Math.random()-.5)*180,B.y+(Math.random()-.5)*180,160);
      playSound('explode'); shake.i=Math.max(shake.i,30);
      splatWall(B.x+(Math.random()-.5)*200,B.y+(Math.random()-.5)*200,8);
    },i*350);
  }

  const overlay=document.getElementById('deathOverlay');
  overlay.style.display='flex';

  setTimeout(()=>{
    isDead=false; rage=0; combo=0; comboTimer=0;
    B.expr='normal'; B.exprT=0; B.hitFlash=0;
    B.bruised=false; B.torn=false; B.isFrozen=false;
    B.x=baseX; B.y=baseY; B.vx=0; B.vy=0;
    B.rot=0; B.aVel=0; B.scale=1; B.scaleTarget=1;
    particles.length=0;
    overlay.style.display='none';
    speak("I'm back... You'll regret that!");
    updateHUD();
  },4500);
}

// ═══════════════════════════════════════
//  HUD
// ═══════════════════════════════════════
function updateHUD(){
  document.getElementById('coins').textContent='🪙 '+coins;
  document.getElementById('rageFill').style.width=rage+'%';
  document.getElementById('rageLbl').textContent='RAGE: '+~~rage+'%';
  document.getElementById('rageFill').style.background=
    rage>80?'linear-gradient(to right,#ff00ff,#ff0000)':
    rage>50?'linear-gradient(to right,#ff4400,#ff0000)':
            'linear-gradient(to right,#ff8800,#ff4400)';
  document.getElementById('weaponLbl').textContent=selWeapon.emoji+' '+selWeapon.name;
  const c=document.getElementById('comboLbl');
  if(combo>=3){c.textContent='x'+combo+' COMBO!';c.style.fontSize=Math.min(2.5,1+combo*.04)+'rem';}
  else c.textContent='';
}

// ═══════════════════════════════════════
//  SHOP
// ═══════════════════════════════════════
function openShop(){
  document.getElementById('shopOverlay').style.display='block';
  document.getElementById('shopCoins').textContent='🪙 '+coins+' coins';
  const grid=document.getElementById('wGrid'); grid.innerHTML='';
  WEAPONS.forEach(w=>{
    const o=owned.has(w.id), sel=selWeapon.id===w.id, ca=coins>=w.cost;
    const div=document.createElement('div');
    div.className='wItem'+(o?(sel?' sel':' owned'):(ca?'':' broke'));
    div.innerHTML=`<span class="wEmoji">${w.emoji}</span><span class="wName">${w.name}</span>
      <span>${o?(sel?'<span class="wSel">✓ ACTIVE</span>':'<span class="wOwned">✓ OWNED</span>'):
      '<span class="wCost">🪙 '+w.cost+'</span>'}</span>`;
    div.onclick=()=>{
      if(o){selWeapon=w;closeShop();}
      else if(ca){coins-=w.cost;owned.add(w.id);selWeapon=w;closeShop();}
    };
    grid.appendChild(div);
  });
}
function closeShop(){document.getElementById('shopOverlay').style.display='none';updateHUD();}

// ═══════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════
let pDown=false, pStartX=0, pStartY=0;

function onDown(px,py){
  try{getAC().resume();}catch(e){}
  pDown=true; pStartX=px; pStartY=py; mX=px; mY=py;
  dragHist=[{x:px,y:py,t:Date.now()}];
  if(inBuddy(px,py)){
    isDrag=true; dragOX=px-B.x; dragOY=py-B.y;
  }
}
function onMove(px,py){
  mX=px; mY=py;
  dragHist.push({x:px,y:py,t:Date.now()});
  if(dragHist.length>12) dragHist.shift();
  // Cursor
  canvas.style.cursor=inBuddy(px,py)||isDrag?'grabbing':'crosshair';
}
function onUp(px,py){
  if(!pDown) return; pDown=false;
  if(isDrag){
    isDrag=false;
    if(dragHist.length>=2){
      const rec=dragHist.slice(-5);
      const dt2=Math.max(1,(rec[rec.length-1].t-rec[0].t));
      B.vx=(rec[rec.length-1].x-rec[0].x)/dt2*16;
      B.vy=(rec[rec.length-1].y-rec[0].y)/dt2*16;
      B.aVel=B.vx*.06;
    }
  } else {
    const dx=px-pStartX, dy=py-pStartY;
    if(Math.sqrt(dx*dx+dy*dy)<18&&inBuddy(px,py)) hitBuddy(px,py,selWeapon);
  }
  dragHist=[];
}

canvas.addEventListener('mousedown',e=>onDown(e.clientX,e.clientY));
window.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
window.addEventListener('mouseup',e=>onUp(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];onDown(t.clientX,t.clientY);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];onMove(t.clientX,t.clientY);},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];onUp(t.clientX,t.clientY);},{passive:false});

// Rapid fire (hold for rapid weapons)
canvas.addEventListener('mousedown',e=>{
  if(selWeapon.rapid){
    rapidTimer=setInterval(()=>{if(inBuddy(mX,mY)) hitBuddy(mX,mY,selWeapon);},120);
  }
});
window.addEventListener('mouseup',()=>{ clearInterval(rapidTimer); rapidTimer=0; });

function mobileHit(){
  try{getAC().resume();}catch(e){}
  hitBuddy(B.x+(Math.random()-.5)*50,B.y+(Math.random()-.5)*50,selWeapon);
}

// ═══════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════
let lastTs=0;
function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,.05); lastTs=ts;

  // Screen shake
  if(shake.i>0.5){
    shake.x=(Math.random()-.5)*shake.i; shake.y=(Math.random()-.5)*shake.i; shake.i*=.82;
  } else { shake.x=0; shake.y=0; shake.i=0; }

  ctx.save();
  ctx.translate(shake.x,shake.y);
  ctx.clearRect(-50,-50,canvas.width+100,canvas.height+100);

  drawRoom();
  updateParticles(); drawParticles();
  updateBuddy(dt);
  drawBuddy();

  // Rage blood vignette
  if(rage>60){
    const a=(rage-60)/40*.35;
    const rv=ctx.createRadialGradient(canvas.width/2,canvas.height/2,100,canvas.width/2,canvas.height/2,Math.max(canvas.width,canvas.height)*.75);
    rv.addColorStop(0,'rgba(0,0,0,0)'); rv.addColorStop(1,`rgba(180,0,0,${a})`);
    ctx.fillStyle=rv; ctx.fillRect(-50,-50,canvas.width+100,canvas.height+100);
  }

  ctx.restore();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════
//  START
// ═══════════════════════════════════════
function startGame(mode){
  gameMode=mode;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('shopBtn').style.display='block';
  if(mode==='mobile') document.getElementById('hitBtn').style.display='flex';
  resize(); B.x=baseX; B.y=baseY;
  updateHUD(); lastTs=performance.now();
  requestAnimationFrame(loop);
}
window.addEventListener('resize',resize);

// roundRect helper
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
